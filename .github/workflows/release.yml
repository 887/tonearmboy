# =============================================================================
# Release APK on tag — FALLBACK ONLY.
#
# THE PRIMARY RELEASE PATH IS LOCAL: `./scripts/build-release-apk.sh --gh-release`.
# That script builds the APK on the dev machine, uploads it to the GitHub
# Release, and pushes the tag. By the time this workflow runs (because the tag
# push reached origin), the APK is usually ALREADY ATTACHED — and the
# self-disabling step below detects that and exits 0 without rebuilding,
# saving CI minutes.
#
# This workflow exists so that a tag pushed from a machine WITHOUT the local
# build toolchain (e.g. from a phone via the GitHub web UI, or a CI-only
# branch) still produces a downloadable APK.
#
# Trigger policy:
#   - ONLY `push: tags: [v*]` — never on regular branch pushes, never on PRs,
#     never on schedule, never on workflow_dispatch. Zero CI minutes burned
#     by default.
#   - To skip CI for a specific tag, include `[skip ci]` in the tag's
#     annotation message (see README "GitHub Actions fallback" section).
# =============================================================================

name: Release APK on tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to upload assets to the matching release

jobs:
  build:
    name: Build + attach APK (fallback)
    runs-on: ubuntu-latest
    steps:
      - name: Honour [skip ci] in tag annotation
        id: skip_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG}" >>"${GITHUB_OUTPUT}"
          # Annotated-tag message lives in the API; lightweight tags have none.
          MSG="$(gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG}" --jq '.object.url' \
            | xargs -I{} gh api {} --jq '.message // ""' 2>/dev/null || echo '')"
          if printf '%s' "${MSG}" | grep -qiF '[skip ci]'; then
            echo "skip=true" >>"${GITHUB_OUTPUT}"
            echo "Tag annotation contains [skip ci] — exiting 0."
          else
            echo "skip=false" >>"${GITHUB_OUTPUT}"
          fi

      - name: Self-disable if APK already attached
        if: steps.skip_check.outputs.skip != 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.skip_check.outputs.tag }}
        run: |
          set -euo pipefail
          # If the release exists AND has an asset matching tonearm-*.apk,
          # the local build already shipped this tag. Nothing to do.
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" \
                --json assets --jq '.assets[].name' 2>/dev/null \
              | grep -qE '^tonearm-.*\.apk$'; then
            echo "APK already attached to release ${TAG} — skipping rebuild."
            echo "skip=true" >>"${GITHUB_OUTPUT}"
          else
            echo "No matching APK on release ${TAG} (or release missing) — will build."
            echo "skip=false" >>"${GITHUB_OUTPUT}"
          fi

      - name: Checkout
        if: steps.skip_check.outputs.skip != 'true' && steps.existing.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        if: steps.skip_check.outputs.skip != 'true' && steps.existing.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        if: steps.skip_check.outputs.skip != 'true' && steps.existing.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/**') }}

      - name: Decide build flavour
        if: steps.skip_check.outputs.skip != 'true' && steps.existing.outputs.skip != 'true'
        id: flavour
        run: |
          set -euo pipefail
          if [ -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "task=:app:assembleRelease" >>"${GITHUB_OUTPUT}"
            echo "apk=app/build/outputs/apk/release/app-release.apk" >>"${GITHUB_OUTPUT}"
            echo "flavour=release" >>"${GITHUB_OUTPUT}"
          else
            echo "task=:app:assembleDebug" >>"${GITHUB_OUTPUT}"
            echo "apk=app/build/outputs/apk/debug/app-debug.apk" >>"${GITHUB_OUTPUT}"
            echo "flavour=debug" >>"${GITHUB_OUTPUT}"
          fi

      - name: Decode release keystore (if provided)
        if: steps.skip_check.outputs.skip != 'true' && steps.existing.outputs.skip != 'true' && steps.flavour.outputs.flavour == 'release'
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "${KEYSTORE_B64}" | base64 -d > "${RUNNER_TEMP}/release.keystore"
          echo "TONEARM_RELEASE_KEYSTORE=${RUNNER_TEMP}/release.keystore" >>"${GITHUB_ENV}"
          echo "TONEARM_RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >>"${GITHUB_ENV}"
          echo "TONEARM_RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >>"${GITHUB_ENV}"

      - name: Build APK
        if: steps.skip_check.outputs.skip != 'true' && steps.existing.outputs.skip != 'true'
        run: ./gradlew ${{ steps.flavour.outputs.task }} --console=plain

      - name: Stage + checksum APK
        if: steps.skip_check.outputs.skip != 'true' && steps.existing.outputs.skip != 'true'
        id: stage
        env:
          TAG: ${{ steps.skip_check.outputs.tag }}
          BUILD_APK: ${{ steps.flavour.outputs.apk }}
        run: |
          set -euo pipefail
          # Strip the leading 'v' so the asset name matches the local-build pattern
          # (tonearm-<version>-<sha7>.apk, no leading 'v').
          NAME="tonearm-${TAG#v}.apk"
          mkdir -p release
          cp "${BUILD_APK}" "release/${NAME}"
          SHA="$(sha256sum "release/${NAME}" | awk '{print $1}')"
          echo "name=${NAME}" >>"${GITHUB_OUTPUT}"
          echo "sha=${SHA}" >>"${GITHUB_OUTPUT}"
          echo "path=release/${NAME}" >>"${GITHUB_OUTPUT}"

      - name: Upload APK to matching release
        if: steps.skip_check.outputs.skip != 'true' && steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.skip_check.outputs.tag }}
          APK_PATH: ${{ steps.stage.outputs.path }}
          APK_SHA: ${{ steps.stage.outputs.sha }}
        run: |
          set -euo pipefail
          if ! gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${TAG}" "${APK_PATH}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "tonearm ${TAG}" \
              --notes "Built by GitHub Actions fallback workflow.\n\nAPK SHA-256: \`${APK_SHA}\`"
          else
            gh release upload "${TAG}" "${APK_PATH}" --clobber --repo "${GITHUB_REPOSITORY}"
          fi
